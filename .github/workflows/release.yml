name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,release]'
          python -m pytest -q
      - name: Build release assets
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release
          python -m build
          git archive --format=tar.gz --prefix="ai-obsidian-${VERSION}/" \
            -o "release/ai-obsidian-${VERSION}.tar.gz" HEAD
          cp "release/ai-obsidian-${VERSION}.tar.gz" release/ai-obsidian.tar.gz
          cp scripts/install.sh release/install.sh
          cp "scripts/AI Obsidian Installer.command" "release/AI Obsidian Installer.command"
          cp dist/* release/
          (cd release && shasum -a 256 * > checksums.txt)
      - name: Upload GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release/* \
            --verify-tag \
            --title "AI Obsidian $GITHUB_REF_NAME" \
            --notes "Install with: curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/install.sh | bash"
